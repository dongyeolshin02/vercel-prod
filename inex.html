<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 완료 - 위티박스</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Email Container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 30px;
            border-bottom: 1px solid #cfcfcf;
        }

        .logo {
            height: 25px;
            width: auto;
        }

        .header-title {
            font-size: 15px;
            font-weight: 400;
            line-height: 22.5px;
            color: #111111;
        }

        /* Greeting Section */
        .greeting-section {
            margin-top: 30px;
            margin-bottom: 24px;
        }

        .greeting-hello {
            font-size: 24px;
            font-weight: 400;
            line-height: 36px;
            color: #111111;
        }

        .greeting-name {
            font-size: 24px;
            line-height: 36px;
            color: #111111;
        }

        .greeting-name .name {
            font-weight: 700;
        }

        .greeting-name .suffix {
            font-weight: 400;
        }

        .greeting-message {
            margin-top: 8px;
            font-size: 15px;
            font-weight: 400;
            line-height: 22.5px;
            color: #111111;
        }

        /* Login Box */
        .login-box {
            border: 1px solid #cfcfcf;
            background-color: #ffffff;
            padding: 31px 20px;
            text-align: center;
            margin-bottom: 28px;
        }

        .login-text {
            font-size: 12px;
            font-weight: 400;
            line-height: 18px;
            color: #595959;
            margin-bottom: 27px;
        }

        .login-text .highlight {
            font-weight: 600;
            color: #5ca1ff;
        }

        .login-button {
            display: inline-block;
            width: 330px;
            max-width: 100%;
            padding: 17px 24px;
            background-color: #6bceff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            line-height: 22.5px;
            color: #f3f3f3;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .login-button:hover {
            background-color: #5ab8e8;
        }

        /* Help Section */
        .help-section {
            margin-bottom: 36px;
        }

        .help-text {
            font-size: 12px;
            font-weight: 400;
            line-height: 18px;
            color: #595959;
            margin-bottom: 4px;
        }

        .help-link {
            font-size: 12px;
            font-weight: 600;
            line-height: 18px;
            color: #4763ff;
            text-decoration: underline;
        }

        .help-link:hover {
            text-decoration: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .footer-link {
            font-size: 12px;
            font-weight: 400;
            line-height: 18px;
            color: #595959;
            text-decoration: none;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        .footer-divider {
            width: 1px;
            height: 16px;
            background-color: #cfcfcf;
        }

        .footer-address {
            font-size: 12px;
            font-weight: 300;
            line-height: 18px;
            color: #595959;
            margin-bottom: 4px;
        }

        .footer-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-info-item {
            font-size: 12px;
            font-weight: 300;
            line-height: 18px;
            color: #595959;
        }

        /* Responsive */
        @media screen and (max-width: 600px) {
            .email-container {
                padding: 24px 20px;
            }

            .login-button {
                width: 100%;
            }

            .footer-info {
                flex-direction: column;
                gap: 4px;
            }

            .footer-info .footer-divider {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="email-container">
        <!-- Header -->
        <div class="header">
            <img src="https://wittiverse-media-dev.s3.ap-northeast-2.amazonaws.com/images/logo_witty.svg" alt="위티박스 로고" class="logo">
            <span class="header-title">이메일 주소 인증</span>
        </div>

        <!-- Greeting Section -->
        <div class="greeting-section">
            <p class="greeting-hello">안녕하세요.</p>
            <p class="greeting-name">
                <span class="name">동열 회원</span><span class="suffix"> 님.</span>
            </p>
            <p class="greeting-message">이미 인증이 완료된 토큰입니다.</p>
        </div>

        <!-- Login Box -->
        <div class="login-box">
            <p class="login-text">
                가입하신 계정으로 <span class="highlight">로그인</span>해 주세요.
            </p>
            <a href="https://dev-ems.wittiverse.com/login" class="login-button">로그인하기</a>
        </div>

        <!-- Help Section -->
        <div class="help-section">
            <p class="help-text">로그인에 어려움이 있을 시, 고객센터로 문의 바랍니다.</p>
            <a href="#" class="help-link">고객센터 바로가기</a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-links">
                <a href="#" class="footer-link">이용 약관</a>
                <div class="footer-divider"></div>
                <a href="#" class="footer-link">개인정보처리방침</a>
                <div class="footer-divider"></div>
                <a href="#" class="footer-link">고객센터</a>
            </div>
            <p class="footer-address">서울특별시 강남구 역삼로17길 51(역삼동,미드타운센터 역삼)</p>
            <div class="footer-info">
                <span class="footer-info-item">대표이사: 정훈</span>
                <div class="footer-divider"></div>
                <span class="footer-info-item">대표번호: 02-3448-1540</span>
                <div class="footer-divider"></div>
                <span class="footer-info-item">팩스: 02-3448-1580</span>
            </div>
        </div>
    </div>
</body>

</html>
